<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tesla | Vehicle Details</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

  <!-- Ambient Dynamic Glass Background -->
  <div class="glass-bg-canvas"></div>

  <!-- Glass Header -->
  <header class="glass-header">
    <div class="header-container">
      <a href="index.html" class="back-link">
        <i class="fa-solid fa-arrow-left"></i> Back to Showroom
      </a>
      
      <div class="logo-wrapper">
        <svg class="tesla-logo" viewBox="0 0 342 35" xmlns="http://www.w3.org/2000/svg">
          <path fill="#e82127" d="M0 .1a9.7 9.7 0 0 0 7 7h11l-3 19h10l3-19h11a9.7 9.7 0 0 0 7-7H0zm55 0a9.7 9.7 0 0 0 7 7h10v5H58a9.7 9.7 0 0 0-7 7v7h28v-7H68v-5h12a9.7 9.7 0 0 0 7-7V.1H55zm46 0a9.7 9.7 0 0 0 7 7h10l-3 19h10l3-19h11a9.7 9.7 0 0 0 7-7H101zm55 0a9.7 9.7 0 0 0 7 7h11v12h10V7h11a9.7 9.7 0 0 0 7-7h-46zm55 0a9.7 9.7 0 0 0 7 7h10v5h-14a9.7 9.7 0 0 0-7 7v7h28V.1h-24z"/>
        </svg>
      </div>
    </div>
  </header>

  <!-- Detailed View Container -->
  <main class="main-container">
    <div class="details-wrapper glass-card-large" id="detailsContainer">
      
      <!-- Skeleton Loading State -->
      <div class="details-skeleton">
        <div class="skeleton-gallery"></div>
        <div class="skeleton-info"></div>
      </div>

    </div>
  </main>

  <!-- Floating Quick Support Action Button -->
  <div class="floating-support-container">
    <button class="support-fab" id="supportFab" aria-label="Support Options">
      <i class="fa-solid fa-headset"></i>
    </button>

    <div class="support-menu glass-panel" id="supportMenu">
      <a href="https://t.me/YourTelegramSupportHandle" target="_blank" class="support-item telegram">
        <i class="fa-brands fa-telegram"></i> Telegram Support
      </a>
      <a href="mailto:support@teslashowroom.com" class="support-item email">
        <i class="fa-solid fa-envelope"></i> Email Support
      </a>
    </div>
  </div>

  <!-- Footer -->
  <footer class="glass-footer">
    <p>&copy; Tesla Glass Showroom. Powered by Firebase & ImgBB.</p>
  </footer>

  <!-- Car Details JavaScript Module -->
  <script type="module" src="js/car-details.js"></script>

</body>
</html>
