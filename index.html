<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tesla | Glass Showroom</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

  <!-- Ambient Dynamic Glass Background Overlay -->
  <div class="glass-bg-canvas"></div>

  <!-- Glass Header & Navigation -->
  <header class="glass-header">
    <div class="header-container">
      
      <!-- Tesla Logo with Secret 5-Tap Listener -->
      <div class="logo-wrapper" id="teslaLogoBtn" title="Tesla Showroom">
  <img 
    src="https://upload.wikimedia.org/wikipedia/commons/e/e8/Tesla_logo.png" 
    alt="Tesla" 
    class="tesla-logo-img"
  >
</div>
      <nav class="nav-links">
        <a href="#showroom" class="nav-link active">Vehicles</a>
        <a href="#about" class="nav-link">About</a>
      </nav>

    </div>
  </header>

  <!-- Hero Banner -->
  <section class="hero-section">
    <div class="hero-content glass-card-hero">
      <span class="hero-badge">The Future of Mobility</span>
      <h1>Experience Tesla Electric Performance</h1>
      <p>Explore custom specs, order direct via Telegram or WhatsApp, or build your dream drive.</p>
    </div>
  </section>

  <!-- Vehicle Catalog Section -->
  <main class="main-container" id="showroom">
    <div class="section-title">
      <h2>Active Showroom Models</h2>
      <div class="title-line"></div>
    </div>

    <!-- Responsive Car Grid (3 per row on desktop, 1 on mobile) -->
    <div class="car-grid" id="carGrid">
      <!-- Loading Skeleton Cards -->
      <div class="glass-card skeleton"></div>
      <div class="glass-card skeleton"></div>
      <div class="glass-card skeleton"></div>
    </div>
  </main>

  <!-- Floating Quick Support Action Button -->
  <div class="floating-support-container">
    <button class="support-fab" id="supportFab" aria-label="Support Options">
      <i class="fa-solid fa-headset"></i>
    </button>

    <div class="support-menu glass-panel" id="supportMenu">
      <a href="https://t.me/YourTelegramSupportHandle" target="_blank" class="support-item telegram">
        <i class="fa-brands fa-telegram"></i> Telegram Support
      </a>
      <a href="mailto:support@teslashowroom.com" class="support-item email">
        <i class="fa-solid fa-envelope"></i> Email Support
      </a>
    </div>
  </div>

  <!-- Footer -->
  <footer class="glass-footer">
    <p>&copy; Tesla Glass Showroom. Powered by SpaceX.</p>
  </footer>

  <!-- Main JavaScript App Module -->
  <script type="module" src="js/app.js"></script>

</body>
</html>
